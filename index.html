<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity Trap – Video Generator</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222;
            --accent: #00ff88;
            --accent2: #ff4470;
            --text: #e0e0e0;
            --text2: #999;
            --border: #2a2a2a;
            --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(0, 255, 136, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 68, 112, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(100, 100, 255, 0.02) 0%, transparent 70%);
            background-attachment: fixed;
        }
        .container {
            width: 100%;
            max-width: 720px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 8px;
        }
        .header .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #00ff88 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text2);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: var(--transition);
        }
        .card:hover { border-color: #3a3a3a; }
        .card h2 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6); }
            50% { box-shadow: 0 0 0 12px rgba(0, 255, 136, 0); }
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--font);
            transition: var(--transition);
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover {
            background: #00dd70;
            box-shadow: 0 4px 24px rgba(0, 255, 136, 0.35);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: #555; background: #2a2a2a; }
        .progress-section {
            display: none;
            margin-top: 8px;
        }
        .progress-section.active { display: block; }
        .progress-bar-outer {
            width: 100%;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00ccff);
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text2);
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-wrap: wrap;
            gap: 4px;
        }
        .progress-steps span { opacity: 0.4; transition: var(--transition); }
        .progress-steps span.done { opacity: 1; color: var(--accent); }
        .progress-steps span.current { opacity: 1; color: #fff; animation: pulse-text 1s ease-in-out infinite; }
        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .log-box {
            margin-top: 16px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            max-height: 200px;
            overflow-y: auto;
            font-family: var(--mono);
            font-size: 12px;
            color: #aaa;
            line-height: 1.7;
            display: none;
        }
        .log-box.active { display: block; }
        .log-box .log-entry {
            border-left: 2px solid #333;
            padding-left: 10px;
            margin-bottom: 4px;
        }
        .log-box .log-entry.success { border-left-color: var(--accent); color: #ccc; }
        .log-box .log-entry.error { border-left-color: var(--accent2); color: #ff8888; }
        .log-box .log-entry.info { border-left-color: #00ccff; color: #88ccff; }
        .output-section { display: none; margin-top: 8px; }
        .output-section.active { display: block; }
        .output-section video {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: #000;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
        }
        .output-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preset-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .preset-chip {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            transition: var(--transition);
            user-select: none;
        }
        .preset-chip:hover { border-color: #555; color: #fff; background: #2a2a2a; }
        .preset-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 136, 0.08); }
        .api-key-section {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .api-key-section input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--mono);
            outline: none;
        }
        .api-key-section input:focus { border-color: #00ccff; }
        .api-key-section label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.idle { background: #555; }
        .status-dot.running { background: #00ccff; animation: pulse-dot 1s ease-in-out infinite; }
        .status-dot.done { background: var(--accent); }
        .status-dot.error { background: var(--accent2); }
        @media (max-width: 600px) {
            .container { padding: 12px; gap: 14px; }
            .card { padding: 16px; }
            .input-group { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="logo-icon">🎬</span>
            <h1>The Curiosity Trap</h1>
            <p class="subtitle">AI Video Engine · Documentary Style</p>
        </div>

        <!-- Theme Input Card -->
        <div class="card">
            <h2><span class="dot"></span> Choose a Theme</h2>
            <div class="input-group">
                <input type="text" id="themeInput" placeholder="e.g., The Collapse of the Bronze Age..." autocomplete="off">
                <button class="btn btn-primary" id="generateBtn" onclick="startGeneration()">⚡ Generate Video</button>
            </div>
            <div class="preset-grid" id="presetGrid">
                <span class="preset-chip" data-theme="The Collapse of the Bronze Age">🏛️ Bronze Age Collapse</span>
                <span class="preset-chip" data-theme="The Secret World of Deep Sea Creatures">🌊 Deep Sea Creatures</span>
                <span class="preset-chip" data-theme="How AI Quietly Conquered the World">🤖 AI Conquest</span>
                <span class="preset-chip" data-theme="The Rise and Fall of the Roman Empire">🏛️ Roman Empire</span>
                <span class="preset-chip" data-theme="The Mysteries of Black Holes">🕳️ Black Holes</span>
                <span class="preset-chip" data-theme="The Psychology of Why We Procrastinate">🧠 Procrastination</span>
            </div>
            <div class="api-key-section">
                <label>🔑 Gemini Key 1:</label>
                <input type="password" id="geminiKey1" placeholder="Primary API key (required)">
                <label style="margin-left:12px;">🔑 Gemini Key 2 (optional backup):</label>
                <input type="password" id="geminiKey2" placeholder="Backup key – used if key 1 is exhausted">
                <button class="btn btn-outline" onclick="saveApiKeys()" style="padding:10px 16px;font-size:12px;">💾 Save Keys</button>
            </div>
            <div class="api-key-section" style="border-top: none; padding-top: 0;">
                <label>📸 Pexels API Key:</label>
                <input type="password" id="pexelsKey" placeholder="Your Pexels key">
            </div>
        </div>

        <!-- Progress Section -->
        <div class="card progress-section" id="progressSection">
            <h2>
                <span class="status-dot running" id="statusDot"></span>
                <span id="progressTitle">Generating...</span>
            </h2>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <div class="progress-steps" id="progressSteps">
                <span data-step="script">📝 Script</span>
                <span data-step="tts">🔊 Voice</span>
                <span data-step="images">🖼️ Images</span>
                <span data-step="compose">🎬 Compose</span>
                <span data-step="subtitles">💬 Subtitles</span>
                <span data-step="final">✅ Final</span>
            </div>
            <div class="log-box active" id="logBox"></div>
        </div>

        <!-- Output Section -->
        <div class="card output-section" id="outputSection">
            <h2><span class="status-dot done"></span> Your Video is Ready</h2>
            <video id="outputVideo" controls poster="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='720' height='405'><rect fill='%23111' width='720' height='405'/><text x='360' y='210' text-anchor='middle' fill='%23555' font-size='18' font-family='sans-serif'>🎬 Your Generated Video</text></svg>"></video>
            <div class="output-actions">
                <button class="btn btn-primary" onclick="downloadVideo()">⬇️ Download MP4</button>
                <button class="btn btn-outline" onclick="regenerateVideo()">🔄 Regenerate</button>
                <button class="btn btn-outline" onclick="shareVideo()">📤 Share Link</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        // 🔁 CHANGE THIS to your actual Render backend URL!
        const BACKEND_URL = 'https://curiosity-trap-backend.onrender.com';
        // =====================================================

        const state = {
            isGenerating: false,
            currentTheme: '',
            videoUrl: null,
            apiKeys: { gemini1: '', gemini2: '', pexels: '' }
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadApiKeys();
            setupPresets();
            setupThemeInputEnter();
        });

        function loadApiKeys() {
            try {
                const saved = JSON.parse(localStorage.getItem('curiosity_trap_keys') || '{}');
                state.apiKeys.gemini1 = saved.gemini1 || '';
                state.apiKeys.gemini2 = saved.gemini2 || '';
                state.apiKeys.pexels = saved.pexels || '';
                document.getElementById('geminiKey1').value = state.apiKeys.gemini1;
                document.getElementById('geminiKey2').value = state.apiKeys.gemini2;
                document.getElementById('pexelsKey').value = state.apiKeys.pexels;
            } catch (e) { /* ignore */ }
        }

        function saveApiKeys() {
            state.apiKeys.gemini1 = document.getElementById('geminiKey1').value.trim();
            state.apiKeys.gemini2 = document.getElementById('geminiKey2').value.trim();
            state.apiKeys.pexels = document.getElementById('pexelsKey').value.trim();
            localStorage.setItem('curiosity_trap_keys', JSON.stringify(state.apiKeys));
            addLog('info', '🔑 API keys saved to local storage');
            const btn = document.querySelector('.api-key-section .btn-outline');
            if (btn) {
                btn.textContent = '✅ Saved!';
                setTimeout(() => { btn.textContent = '💾 Save Keys'; }, 1500);
            }
        }

        function setupPresets() {
            const grid = document.getElementById('presetGrid');
            grid.addEventListener('click', (e) => {
                const chip = e.target.closest('.preset-chip');
                if (!chip) return;
                grid.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                document.getElementById('themeInput').value = chip.dataset.theme;
            });
        }

        function setupThemeInputEnter() {
            document.getElementById('themeInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') startGeneration();
            });
        }

        // ==================== LOGGING & UI ====================
        function addLog(type, message) {
            const logBox = document.getElementById('logBox');
            logBox.classList.add('active');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateProgress(step, percentage) {
            document.getElementById('progressBar').style.width = percentage + '%';
            const steps = document.querySelectorAll('#progressSteps span');
            steps.forEach(s => {
                s.classList.remove('done', 'current');
                if (s.dataset.step === step) s.classList.add('current');
            });
            const stepOrder = ['script', 'tts', 'images', 'compose', 'subtitles', 'final'];
            const currentIdx = stepOrder.indexOf(step);
            steps.forEach(s => {
                const idx = stepOrder.indexOf(s.dataset.step);
                if (idx < currentIdx) s.classList.add('done');
                if (idx === currentIdx) s.classList.add('current');
            });
            document.getElementById('progressTitle').textContent =
                step === 'final' ? '✅ Finalizing...' : `⏳ ${step.charAt(0).toUpperCase() + step.slice(1)}...`;
        }

        function setStatus(state_type) {
            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot ' + state_type;
        }

        // ==================== GENERATION LOGIC ====================
        async function startGeneration() {
            if (state.isGenerating) return;

            const theme = document.getElementById('themeInput').value.trim();
            if (!theme) {
                alert('Please enter a theme first.');
                return;
            }

            const gemini1 = document.getElementById('geminiKey1').value.trim();
            const gemini2 = document.getElementById('geminiKey2').value.trim();
            const pexels = document.getElementById('pexelsKey').value.trim();

            if (!gemini1 && !gemini2) {
                alert('Please enter at least one Gemini API key.');
                return;
            }
            if (!pexels) {
                alert('Please enter a Pexels API key.');
                return;
            }

            state.apiKeys.gemini1 = gemini1;
            state.apiKeys.gemini2 = gemini2;
            state.apiKeys.pexels = pexels;
            saveApiKeys();

            // Build list of non-empty keys
            const geminiKeys = [gemini1, gemini2].filter(k => k.length > 0);

            state.isGenerating = true;
            state.currentTheme = theme;
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            // Reset UI
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('logBox').classList.add('active');
            document.getElementById('progressBar').style.width = '0%';
            setStatus('running');
            updateProgress('script', 5);

            addLog('info', `🎯 Theme: "${theme}"`);
            addLog('info', `🔑 Using ${geminiKeys.length} Gemini key(s)`);

            try {
                // Step 1: Script
                addLog('info', '📝 Generating script with Gemini AI...');
                updateProgress('script', 10);
                const scriptData = await generateScript(theme, geminiKeys);
                addLog('success', `✅ Script generated: ${scriptData.title}`);
                addLog('info', `📜 Chapters: ${scriptData.chapters.length} | ~${scriptData.fullText.split(' ').length} words`);
                updateProgress('script', 25);

                // Step 2: TTS
                addLog('info', '🔊 Starting realistic TTS...');
                updateProgress('tts', 30);
                const audioBlob = await generateTTSWithPolling(scriptData.fullText);
                addLog('success', '✅ TTS audio generated');
                updateProgress('tts', 50);

                // Step 3: Images
                addLog('info', '🖼️ Fetching images from Pexels...');
                updateProgress('images', 55);
                const imageUrls = await fetchImages(scriptData, pexels);
                addLog('success', `✅ Fetched ${imageUrls.length} images`);
                updateProgress('images', 70);

                // Step 4: Compose video
                addLog('info', '🎬 Composing video with Ken Burns, vignette...');
                updateProgress('compose', 75);
                const videoBlob = await composeVideo(scriptData, audioBlob, imageUrls);
                addLog('success', '✅ Video composition complete');
                updateProgress('compose', 85);

                // Step 5: Subtitles
                addLog('info', '💬 Burning word-by-word subtitles...');
                updateProgress('subtitles', 90);
                const finalVideo = await addSubtitles(videoBlob, scriptData);
                addLog('success', '✅ Subtitles added');
                updateProgress('subtitles', 95);

                // Finalize
                updateProgress('final', 98);
                state.videoUrl = URL.createObjectURL(finalVideo);
                document.getElementById('outputVideo').src = state.videoUrl;
                document.getElementById('outputSection').classList.add('active');
                setStatus('done');
                updateProgress('final', 100);
                document.getElementById('progressTitle').textContent = '✅ Video Complete!';
                addLog('success', '🎉 Video generation complete! Duration: ~8 minutes');
                addLog('info', '📺 Your documentary-style video is ready to watch and download.');

            } catch (err) {
                addLog('error', `❌ Error: ${err.message}`);
                setStatus('error');
                document.getElementById('progressTitle').textContent = '❌ Generation Failed';
                console.error(err);
            } finally {
                state.isGenerating = false;
                btn.disabled = false;
                btn.textContent = '⚡ Generate Video';
            }
        }

        // ==================== API CALLS ====================
        async function generateScript(theme, geminiKeys) {
            const resp = await fetch(`${BACKEND_URL}/api/generate-script`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme, apiKeys: geminiKeys }),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || `Script generation failed (${resp.status})`);
            }
            return await resp.json();
        }

        // Polling TTS function
        async function generateTTSWithPolling(text) {
            const startResp = await fetch(`${BACKEND_URL}/api/generate-tts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            if (!startResp.ok) {
                const err = await startResp.json().catch(() => ({}));
                throw new Error(err.detail || 'Failed to start TTS');
            }
            const { task_id } = await startResp.json();

            let status = 'processing';
            while (status === 'processing') {
                await new Promise(r => setTimeout(r, 1000));
                const statusResp = await fetch(`${BACKEND_URL}/api/tts-status/${task_id}`);
                if (!statusResp.ok) throw new Error('TTS status check failed');
                const data = await statusResp.json();
                status = data.status;
                if (status === 'error') throw new Error('TTS generation error');
            }

            const downloadResp = await fetch(`${BACKEND_URL}/api/tts-download/${task_id}`);
            if (!downloadResp.ok) throw new Error('TTS download failed');
            return await downloadResp.blob();
        }

        async function fetchImages(scriptData, apiKey) {
            const keywords = extractKeywords(scriptData);
            const resp = await fetch(`${BACKEND_URL}/api/fetch-images`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keywords, count: 15, apiKey }),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || 'Image fetch failed');
            }
            const data = await resp.json();
            return data.urls || [];
        }

        async function composeVideo(scriptData, audioBlob, imageUrls) {
            const formData = new FormData();
            formData.append('script', JSON.stringify(scriptData));
            formData.append('audio', audioBlob, 'audio.mp3');
            formData.append('imageUrls', JSON.stringify(imageUrls));

            const resp = await fetch(`${BACKEND_URL}/api/compose-video`, {
                method: 'POST',
                body: formData,
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || `Video composition failed (${resp.status})`);
            }
            return await resp.blob();
        }

        async function addSubtitles(videoBlob, scriptData) {
            const formData = new FormData();
            formData.append('video', videoBlob, 'video.mp4');
            formData.append('script', JSON.stringify(scriptData));

            const resp = await fetch(`${BACKEND_URL}/api/add-subtitles`, {
                method: 'POST',
                body: formData,
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || `Subtitle addition failed (${resp.status})`);
            }
            return await resp.blob();
        }

        function extractKeywords(scriptData) {
            const keywords = new Set();
            scriptData.chapters.forEach(ch => {
                ch.title.split(' ').filter(w => w.length > 3).forEach(w => keywords.add(w.toLowerCase()));
            });
            scriptData.title.split(' ').filter(w => w.length > 3).forEach(w => keywords.add(w.toLowerCase()));
            if (scriptData.keyEntities) {
                scriptData.keyEntities.forEach(e => keywords.add(e.toLowerCase()));
            }
            return [...keywords].slice(0, 20);
        }

        // ==================== OUTPUT ACTIONS ====================
        function downloadVideo() {
            if (!state.videoUrl) return;
            const a = document.createElement('a');
            a.href = state.videoUrl;
            a.download = `curiosity_trap_${state.currentTheme.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40)}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            addLog('success', '⬇️ Download started');
        }

        function regenerateVideo() {
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('logBox').classList.remove('active');
            document.getElementById('progressBar').style.width = '0%';
            state.videoUrl = null;
            document.getElementById('outputVideo').src = '';
            startGeneration();
        }

        function shareVideo() {
            if (navigator.share && state.videoUrl) {
                navigator.share({
                    title: `Curiosity Trap: ${state.currentTheme}`,
                    text: `Check out this AI-generated documentary about: ${state.currentTheme}`,
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(
                    `🎬 Curiosity Trap Video: "${state.currentTheme}" - Generated with AI documentary engine.`
                );
                addLog('info', '📋 Share text copied to clipboard');
            }
        }
    </script>
</body>
