<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity Trap – Video Generator</title>
    <!-- CSS (same as before, omitted for brevity) -->
    <style>
        /* ... all styles from the previous complete frontend ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- Header (same) -->
        <div class="header">
            <span class="logo-icon">🎬</span>
            <h1>The Curiosity Trap</h1>
            <p class="subtitle">AI Video Engine · Documentary Style</p>
        </div>

        <!-- Theme Input Card -->
        <div class="card">
            <h2><span class="dot"></span> Choose a Theme</h2>
            <div class="input-group">
                <input type="text" id="themeInput" placeholder="e.g., The Collapse of the Bronze Age..." autocomplete="off">
                <button class="btn btn-primary" id="generateBtn" onclick="startGeneration()">⚡ Generate Video</button>
            </div>
            <div class="preset-grid" id="presetGrid">
                <span class="preset-chip" data-theme="The Collapse of the Bronze Age">🏛️ Bronze Age Collapse</span>
                <span class="preset-chip" data-theme="The Secret World of Deep Sea Creatures">🌊 Deep Sea Creatures</span>
                <span class="preset-chip" data-theme="How AI Quietly Conquered the World">🤖 AI Conquest</span>
                <span class="preset-chip" data-theme="The Rise and Fall of the Roman Empire">🏛️ Roman Empire</span>
                <span class="preset-chip" data-theme="The Mysteries of Black Holes">🕳️ Black Holes</span>
                <span class="preset-chip" data-theme="The Psychology of Why We Procrastinate">🧠 Procrastination</span>
            </div>
            <div class="api-key-section">
                <label>🔑 Gemini Key 1:</label>
                <input type="password" id="geminiKey1" placeholder="Primary API key (required)">
                <label style="margin-left:12px;">🔑 Gemini Key 2 (optional backup):</label>
                <input type="password" id="geminiKey2" placeholder="Backup key – used if key 1 is exhausted">
                <button class="btn btn-outline" onclick="saveApiKeys()" style="padding:10px 16px;font-size:12px;">💾 Save Keys</button>
            </div>
            <div class="api-key-section" style="border-top: none; padding-top: 0;">
                <label>📸 Pexels API Key:</label>
                <input type="password" id="pexelsKey" placeholder="Your Pexels key">
            </div>
        </div>

        <!-- Progress Section (same) -->
        <div class="card progress-section" id="progressSection">
            <!-- identical to previous version -->
        </div>

        <!-- Output Section (same) -->
        <div class="card output-section" id="outputSection">
            <!-- identical to previous version -->
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const BACKEND_URL = 'https://curiosity-trap-backend.onrender.com';  // CHANGE THIS

        const state = {
            isGenerating: false,
            currentTheme: '',
            videoUrl: null,
            apiKeys: { gemini1: '', gemini2: '', pexels: '' }
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadApiKeys();
            setupPresets();
            setupThemeInputEnter();
        });

        function loadApiKeys() {
            try {
                const saved = JSON.parse(localStorage.getItem('curiosity_trap_keys') || '{}');
                state.apiKeys.gemini1 = saved.gemini1 || '';
                state.apiKeys.gemini2 = saved.gemini2 || '';
                state.apiKeys.pexels = saved.pexels || '';
                document.getElementById('geminiKey1').value = state.apiKeys.gemini1;
                document.getElementById('geminiKey2').value = state.apiKeys.gemini2;
                document.getElementById('pexelsKey').value = state.apiKeys.pexels;
            } catch(e) {}
        }

        function saveApiKeys() {
            state.apiKeys.gemini1 = document.getElementById('geminiKey1').value.trim();
            state.apiKeys.gemini2 = document.getElementById('geminiKey2').value.trim();
            state.apiKeys.pexels = document.getElementById('pexelsKey').value.trim();
            localStorage.setItem('curiosity_trap_keys', JSON.stringify(state.apiKeys));
            addLog('info', '🔑 Keys saved');
        }

        // ... (setupPresets, setupThemeInputEnter, addLog, updateProgress, setStatus remain identical) ...

        // ==================== GENERATION LOGIC ====================
        async function startGeneration() {
            // Validation: at least one Gemini key and Pexels key required
            const gemini1 = document.getElementById('geminiKey1').value.trim();
            const gemini2 = document.getElementById('geminiKey2').value.trim();
            const pexels = document.getElementById('pexelsKey').value.trim();
            if (!gemini1 && !gemini2) {
                alert('Please enter at least one Gemini API key.');
                return;
            }
            if (!pexels) {
                alert('Please enter a Pexels API key.');
                return;
            }

            const theme = document.getElementById('themeInput').value.trim();
            if (!theme) {
                alert('Please enter a theme.');
                return;
            }

            state.apiKeys.gemini1 = gemini1;
            state.apiKeys.gemini2 = gemini2;
            state.apiKeys.pexels = pexels;
            saveApiKeys();

            // Build list of keys (non-empty)
            const geminiKeys = [gemini1, gemini2].filter(k => k.length > 0);

            state.isGenerating = true;
            state.currentTheme = theme;
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            // Reset UI
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('logBox').classList.add('active');
            document.getElementById('progressBar').style.width = '0%';
            setStatus('running');
            updateProgress('script', 5);

            addLog('info', `🎯 Theme: "${theme}"`);
            addLog('info', `🔑 Using ${geminiKeys.length} Gemini key(s)`);

            try {
                // Step 1: Script (sends array of keys)
                addLog('info', '📝 Generating script...');
                updateProgress('script', 10);
                const scriptData = await generateScript(theme, geminiKeys);
                addLog('success', `✅ Script: ${scriptData.title}`);
                addLog('info', `📜 ~${scriptData.fullText.split(' ').length} words`);
                updateProgress('script', 25);

                // Step 2: TTS (polling)
                addLog('info', '🔊 Starting TTS...');
                updateProgress('tts', 30);
                const audioBlob = await generateTTSWithPolling(scriptData.fullText);
                addLog('success', '✅ TTS generated');
                updateProgress('tts', 50);

                // Step 3: Images
                addLog('info', '🖼️ Fetching images...');
                updateProgress('images', 55);
                const imageUrls = await fetchImages(scriptData, pexels);
                addLog('success', `✅ ${imageUrls.length} images`);
                updateProgress('images', 70);

                // Step 4: Compose video
                addLog('info', '🎬 Composing video...');
                updateProgress('compose', 75);
                const videoBlob = await composeVideo(scriptData, audioBlob, imageUrls);
                addLog('success', '✅ Video composed');
                updateProgress('compose', 85);

                // Step 5: Subtitles
                addLog('info', '💬 Adding subtitles...');
                updateProgress('subtitles', 90);
                const finalVideo = await addSubtitles(videoBlob, scriptData);
                addLog('success', '✅ Subtitles added');
                updateProgress('subtitles', 95);

                // Final
                updateProgress('final', 98);
                state.videoUrl = URL.createObjectURL(finalVideo);
                document.getElementById('outputVideo').src = state.videoUrl;
                document.getElementById('outputSection').classList.add('active');
                setStatus('done');
                updateProgress('final', 100);
                addLog('success', '🎉 Video complete!');

            } catch (err) {
                addLog('error', `❌ ${err.message}`);
                setStatus('error');
                document.getElementById('progressTitle').textContent = '❌ Failed';
            } finally {
                state.isGenerating = false;
                btn.disabled = false;
                btn.textContent = '⚡ Generate Video';
            }
        }

        // ==================== API CALLS (modified) ====================
        async function generateScript(theme, geminiKeys) {
            const resp = await fetch(`${BACKEND_URL}/api/generate-script`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme, apiKeys: geminiKeys }),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || `Script failed (${resp.status})`);
            }
            return await resp.json();
        }

        // Polling TTS (same as before)
        async function generateTTSWithPolling(text) {
            const startResp = await fetch(`${BACKEND_URL}/api/generate-tts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            if (!startResp.ok) throw new Error('TTS start failed');
            const { task_id } = await startResp.json();
            let status = 'processing';
            while (status === 'processing') {
                await new Promise(r => setTimeout(r, 1000));
                const statusResp = await fetch(`${BACKEND_URL}/api/tts-status/${task_id}`);
                if (!statusResp.ok) throw new Error('TTS status check failed');
                const data = await statusResp.json();
                status = data.status;
                if (status === 'error') throw new Error('TTS generation error');
            }
            const downloadResp = await fetch(`${BACKEND_URL}/api/tts-download/${task_id}`);
            if (!downloadResp.ok) throw new Error('TTS download failed');
            return await downloadResp.blob();
        }

        async function fetchImages(scriptData, apiKey) {
            const keywords = extractKeywords(scriptData);
            const resp = await fetch(`${BACKEND_URL}/api/fetch-images`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keywords, count: 15, apiKey }),
            });
            if (!resp.ok) throw new Error('Image fetch failed');
            const data = await resp.json();
            return data.urls || [];
        }

        async function composeVideo(scriptData, audioBlob, imageUrls) {
            const formData = new FormData();
            formData.append('script', JSON.stringify(scriptData));
            formData.append('audio', audioBlob, 'audio.mp3');
            formData.append('imageUrls', JSON.stringify(imageUrls));
            const resp = await fetch(`${BACKEND_URL}/api/compose-video`, { method: 'POST', body: formData });
            if (!resp.ok) throw new Error('Compose failed');
            return await resp.blob();
        }

        async function addSubtitles(videoBlob, scriptData) {
            const formData = new FormData();
            formData.append('video', videoBlob, 'video.mp4');
            formData.append('script', JSON.stringify(scriptData));
            const resp = await fetch(`${BACKEND_URL}/api/add-subtitles`, { method: 'POST', body: formData });
            if (!resp.ok) throw new Error('Subtitles failed');
            return await resp.blob();
        }

        function extractKeywords(scriptData) {
            const keywords = new Set();
            scriptData.chapters.forEach(ch => {
                ch.title.split(' ').filter(w => w.length > 3).forEach(w => keywords.add(w.toLowerCase()));
            });
            scriptData.title.split(' ').filter(w => w.length > 3).forEach(w => keywords.add(w.toLowerCase()));
            if (scriptData.keyEntities) scriptData.keyEntities.forEach(e => keywords.add(e.toLowerCase()));
            return [...keywords].slice(0, 20);
        }

        // ... (downloadVideo, regenerateVideo, shareVideo – keep as before)
    </script>
</body>
</html>
